# PM RAG Configuration
# Edit this file to point to your document sources

# ─── Local Folders ────────────────────────────────────────────────────────────
local_folders:
  - path: "~/Documents/YOUR_FOLDER_HERE"
    recursive: true

# ─── Google Drive ─────────────────────────────────────────────────────────────
google_drive:
  enabled: true           # Set to true after completing GOOGLE_DRIVE_SETUP.md
  credentials_file: "credentials.json"
  token_file: "token.json"
  folders:
    - name: "PMPMPM"
      id: "abcdefghijklmnopqrstuvwxyz"  # Get ID from Drive URL

# ─── File Types to Index ──────────────────────────────────────────────────────
file_types:
  - "*.pdf"
  - "*.docx"
  - "*.doc"
  - "*.xlsx"
  - "*.xls"
  - "*.md"
  - "*.txt"

# ─── Exclusions ───────────────────────────────────────────────────────────────
exclude_patterns:
  - "~$*"          # Temp Office files
  - "*.tmp"
  - ".DS_Store"
  - "node_modules"
  - "node_modules/*"
  - "*.js"
  - "*.ts"
  - "*.json"
  - "*.yml"
  - "*.yaml"
  - "*.png"
  - "*.PNG"
  - "*.map"
  - "*.mjs"
  - "*.cjs"
  - "*.cts"
  - "*.lock"
  - "*.key"
  - "*.cert"
  - "*.html"
  - ".git"
  - ".eslintrc"
  - ".editorconfig"
  - ".npmignore"
  - ".nycrc"

# ─── LLM Settings ─────────────────────────────────────────────────────────────
llm:
  provider: "anthropic"   # Options: anthropic | openai | ollama
  model: "claude-sonnet-4-20250514"
  # model: "gpt-4o"
  max_tokens: 2048
  temperature: 0.2          # 0 = fully deterministic, no creative guessing

  # Uncomment if switching to OpenAI:
  # provider: "openai"
  # model: "gpt-4o"

  # Uncomment for free local model (requires: brew install ollama && ollama pull mistral):
  # provider: "ollama"
  # model: "mistral"

# ─── Embedding Settings ───────────────────────────────────────────────────────
embeddings:
  provider: "sentence-transformers"   # Free, runs locally
  model: "all-MiniLM-L6-v2"          # Fast & good quality

# ─── Retrieval Settings ───────────────────────────────────────────────────────
retrieval:
  top_k: 10             # Retrieve more chunks to reduce missed context
  similarity_threshold: 0.1  # Reject answers if best match is below this score (0–1, higher = stricter)
  chunk_size: 800       # Characters per chunk
  chunk_overlap: 150    # Overlap between chunks for context continuity

# ─── Vector Store ─────────────────────────────────────────────────────────────
vector_store:
  path: "./chroma_db"   # Local storage — no cloud needed
